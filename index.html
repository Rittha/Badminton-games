<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ก๊วนคนรักแบดมินตัน — Premium</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Premium SaaS visual refresh
       - Modern gradients
       - Subtle glass effect
       - Neutral palette, high readability
       - Preserve DOM structure and IDs for JS compatibility
    */

    :root{
      --bg-1: #f6f8fb;
      --bg-2: #eef3f9;
      --card-bg: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.6);
      --muted: #6b7280;
      --text: #0f1724;
      --accent: linear-gradient(90deg,#6b8cff 0%,#7bd389 100%);
      --accent-solid: #5b8bff;
      --danger: #ff5b6e;
      --glass-shadow: 0 8px 30px rgba(15,23,36,0.08);
      --radius: 12px;
    }

    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:var(--text);background:linear-gradient(180deg,var(--bg-1),var(--bg-2));-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .app{max-width:1100px;margin:28px auto;padding:18px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:14px}
    .logo{
      width:56px;height:56px;border-radius:12px;
      background:linear-gradient(135deg,#fff,#fff0);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 6px 18px rgba(91,139,255,0.12), inset 0 -6px 18px rgba(123,211,137,0.03);
      border:1px solid rgba(255,255,255,0.6);
      font-weight:800;color:var(--accent-solid);font-size:18px;
    }
    h1{font-size:18px;margin:0;font-weight:700;letter-spacing:0.2px}
    .subtitle{font-size:12px;color:var(--muted);margin-top:2px}
    .controls{display:flex;gap:12px;align-items:center}
    .room-pill{background:linear-gradient(90deg,#ffffffcc, #ffffffaa);padding:8px 12px;border-radius:999px;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);font-weight:600}
    .status{font-size:13px;color:var(--muted);padding-left:6px}

    .card{
      background:var(--card-bg);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--glass-shadow);
      border:1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(8px) saturate(120%);
    }

    .top-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .settings{display:flex;gap:12px;align-items:center}
    label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    input[type="number"], input[type="text"]{
      padding:10px 12px;border-radius:10px;border:1px solid rgba(15,23,36,0.06);background:rgba(255,255,255,0.9);font-weight:600;color:var(--text);
      box-shadow:0 2px 8px rgba(15,23,36,0.03);
    }

    .controls-right{display:flex;gap:8px;align-items:center}
    button{
      border:0;padding:10px 12px;border-radius:10px;font-weight:600;cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,36,0.06);
    }
    .btn-primary{
      background:var(--accent);color:#fff;
      background-image:var(--accent);
      background-size:200% 100%;
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .btn-ghost{
      background:transparent;color:var(--accent-solid);border:1px solid rgba(91,139,255,0.12);
    }
    .btn-danger{background:var(--danger);color:#fff}

    .layout{display:flex;gap:18px;margin-top:8px}
    .left{flex:1}
    .right{width:320px;flex-shrink:0}

    table{width:100%;border-collapse:collapse;background:transparent;border-radius:10px;overflow:hidden}
    thead th{background:linear-gradient(180deg,rgba(255,255,255,0.6),rgba(255,255,255,0.5));text-align:left;padding:12px 14px;font-weight:700;color:var(--muted);font-size:13px;border-bottom:1px solid rgba(15,23,36,0.04)}
    tbody td{padding:12px 14px;border-bottom:1px solid rgba(15,23,36,0.04);vertical-align:middle;background:transparent}
    tbody tr:last-child td{border-bottom:0}
    input.player-name,input.player-hours{padding:8px 10px;border-radius:8px;border:1px solid rgba(15,23,36,0.06);background:rgba(255,255,255,0.9);font-weight:600}
    .actions{display:flex;gap:8px;align-items:center}
    .small{padding:8px 10px;border-radius:8px;font-size:13px}
    .muted{color:var(--muted)}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,0.85),rgba(255,255,255,0.78));padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.6);box-shadow:0 6px 18px rgba(15,23,36,0.04)}
    .panel h3{margin:0 0 8px 0;font-size:15px}
    .summary{margin-top:12px;display:flex;flex-direction:column;gap:8px}
    .note{font-size:12px;color:var(--muted)}

    /* subtle hover states */
    button.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(91,139,255,0.12)}
    .row-action:hover{transform:translateY(-2px)}
    .danger{background:var(--danger);color:#fff}

    @media (max-width:920px){
      .layout{flex-direction:column}
      .right{width:100%}
      .brand h1{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">🏸</div>
        <div>
          <h1>ก๊วนคนรักแบดมินตัน</h1>
          <div class="subtitle">จัดการสมาชิกและชั่วโมงแบบเรียลไทม์ — Premium</div>
        </div>
      </div>

      <div class="controls">
        <div class="room-pill" id="roomIdDisplay">main</div>
        <div id="connectionStatus" class="status">Connecting…</div>
      </div>
    </header>

    <div class="card" id="mainCard">
      <div class="top-row">
        <div class="settings" style="align-items:flex-start">
          <div>
            <label class="small">ราคา ต่อชั่วโมง</label>
            <input id="pricePerHour" type="number" min="0" value="46" style="width:140px"/>
            <div class="note" style="margin-top:6px">ราคาจะถูกนำไปคำนวณในสรุปอัตโนมัติ</div>
          </div>
        </div>

        <div class="controls-right">
          <button id="resetBtn" class="btn-ghost small">รีเซ็ต</button>
          <button id="clearBtn" class="btn-ghost small">ล้างข้อมูล</button>
          <button id="shareBtn" class="btn-ghost small">แชร์</button>
          <button id="exportBtn" class="btn-ghost small">Export CSV</button>
        </div>
      </div>

      <div class="layout">
        <div class="left">
          <table id="playersTable" aria-live="polite">
            <thead>
              <tr>
                <th style="width:48px">#</th>
                <th>ชื่อ</th>
                <th style="width:110px">ชม.</th>
                <th style="width:140px">ค่าใช้จ่าย</th>
                <th style="width:120px">เพิ่ม</th>
                <th style="width:120px">ลด</th>
                <th style="width:80px">ลบ</th>
              </tr>
            </thead>
            <tbody id="playersTbody"></tbody>
          </table>
        </div>

        <div class="right">
          <div class="panel">
            <h3>เพิ่มสมาชิกใหม่</h3>
            <label class="small">ชื่อสมาชิก</label>
            <input id="newPlayerName" type="text" placeholder="ชื่อสมาชิก" />
            <label class="small" style="margin-top:10px">จำนวนชั่วโมง</label>
            <input id="newPlayerHours" type="number" min="0" value="0" />
            <div style="display:flex;gap:10px;margin-top:12px">
              <button id="addPlayerBtn" class="btn-primary small">เพิ่ม</button>
              <button id="addEditPlayerBtn" class="btn-ghost small">เพิ่มแล้วแก้ไข</button>
            </div>
          </div>

          <div class="panel" style="margin-top:14px">
            <h3>สรุป</h3>
            <div class="muted">สมาชิกทั้งหมด <strong id="count">0</strong></div>
            <div class="muted">รวมชั่วโมง <strong id="totalHours">0</strong></div>
            <div class="muted">รวมค่าใช้จ่าย <strong id="totalCost">0 ฿</strong></div>
            <div class="note" style="margin-top:10px">ออกแบบพัฒนาโดย ซุปเปอร์บอล 0957602580</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase v9 modular CDN (ES modules) -->
  <script type="module">
    // Firebase configuration (provided)
    const firebaseConfig = {
      apiKey: "...",
      authDomain: "...",
      projectId: "badminton-games-c8e4e",
      storageBucket: "...",
      messagingSenderId: "...",
      appId: "...",
      measurementId: "..."
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      onSnapshot,
      serverTimestamp,
      getDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Short helpers
    const $ = (s, el = document) => el.querySelector(s);
    const escapeHtml = (s = "") => String(s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#039;");

    // Room from URL
    const room = new URLSearchParams(location.search).get("room") || "main";
    $("#roomIdDisplay").textContent = room;
    const roomDocRef = doc(db, "rooms", room);

    // Elements
    const playersTbody = $("#playersTbody");
    const addPlayerBtn = $("#addPlayerBtn");
    const addEditPlayerBtn = $("#addEditPlayerBtn");
    const newPlayerName = $("#newPlayerName");
    const newPlayerHours = $("#newPlayerHours");
    const pricePerHourInput = $("#pricePerHour");
    const countEl = $("#count");
    const totalHoursEl = $("#totalHours");
    const totalCostEl = $("#totalCost");
    const resetBtn = $("#resetBtn");
    const clearBtn = $("#clearBtn");
    const exportBtn = $("#exportBtn");
    const shareBtn = $("#shareBtn");
    const connectionStatus = $("#connectionStatus");

    // State
    let state = { pricePerHour: 46, players: [], updatedAt: null };
    let unsubscribe = null;
    let lastLocalWriteMs = 0;
    const ECHO_THRESHOLD_MS = 1500;
    let writeTimer = null;
    const DEBOUNCE_MS = 200;

    // Utilities
    function sortPlayers(arr) {
      return arr.slice().sort((a, b) => {
        const an = (a.name || "").toLowerCase();
        const bn = (b.name || "").toLowerCase();
        if (an < bn) return -1;
        if (an > bn) return 1;
        return (a.id || 0) - (b.id || 0);
      });
    }

    // Render UI
    function render() {
      playersTbody.innerHTML = "";
      const players = sortPlayers(state.players || []);
      if (players.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="7" class="muted" style="padding:18px;text-align:center">ไม่ระบุ</td>`;
        playersTbody.appendChild(tr);
      } else {
        players.forEach((p, idx) => {
          const cost = (Number(p.hours || 0) * Number(state.pricePerHour || 0)) || 0;
          const tr = document.createElement("tr");
          tr.dataset.id = p.id;
          tr.innerHTML = `
            <td style="font-weight:700">${idx + 1}</td>
            <td><input class="player-name" data-id="${p.id}" value="${escapeHtml(p.name)}" style="width:100%"/></td>
            <td><input class="player-hours" data-id="${p.id}" type="number" min="0" value="${p.hours}" style="width:80px"/></td>
            <td style="font-weight:700">${cost} ฿</td>
            <td><div class="actions"><button class="small btn-primary row-action inc" data-id="${p.id}">+1</button></div></td>
            <td><div class="actions"><button class="small btn-ghost row-action dec" data-id="${p.id}">-1</button></div></td>
            <td><button class="small btn-danger row-action delete" data-id="${p.id}">ลบ</button></td>
          `;
          playersTbody.appendChild(tr);
        });
      }
      updateSummary();
    }

    function updateSummary() {
      const players = state.players || [];
      const totalPlayers = players.length;
      const totalHours = players.reduce((s, p) => s + Number(p.hours || 0), 0);
      const price = Number(state.pricePerHour || 0);
      countEl.textContent = totalPlayers;
      totalHoursEl.textContent = totalHours;
      totalCostEl.textContent = `${(totalHours * price).toFixed(2)} ฿`;
      if (Number(pricePerHourInput.value) !== Number(price)) {
        pricePerHourInput.value = price;
      }
    }

    // Debounced save
    function scheduleSave() {
      if (writeTimer) clearTimeout(writeTimer);
      writeTimer = setTimeout(() => {
        writeTimer = null;
        saveToFirestore();
      }, DEBOUNCE_MS);
    }

    async function saveToFirestore() {
      try {
        const payload = {
          pricePerHour: Number(state.pricePerHour || 0),
          players: (state.players || []).map(p => ({ id: p.id, name: p.name, hours: Number(p.hours || 0) })),
          updatedAt: serverTimestamp()
        };
        await setDoc(roomDocRef, payload);
        lastLocalWriteMs = Date.now();
        connectionStatus.textContent = "Saved";
        connectionStatus.classList.remove("muted");
      } catch (err) {
        console.error("Save failed", err);
        connectionStatus.textContent = "Save failed";
        connectionStatus.classList.add("muted");
      }
    }

    // Apply remote snapshot
    function applyRemoteData(remote) {
      if (!remote) return;
      const remoteUpdatedAt = remote.updatedAt && remote.updatedAt.toMillis ? remote.updatedAt.toMillis() : null;
      if (lastLocalWriteMs && remoteUpdatedAt && Math.abs(remoteUpdatedAt - lastLocalWriteMs) < ECHO_THRESHOLD_MS) {
        connectionStatus.textContent = "Synced";
        return;
      }
      const remotePlayers = Array.isArray(remote.players) ? remote.players.map(p => ({ id: p.id, name: p.name, hours: Number(p.hours || 0) })) : [];
      const remotePrice = Number(remote.pricePerHour || 0);
      const localJson = JSON.stringify({ pricePerHour: state.pricePerHour, players: sortPlayers(state.players || []) });
      const remoteJson = JSON.stringify({ pricePerHour: remotePrice, players: sortPlayers(remotePlayers) });
      if (localJson === remoteJson) {
        connectionStatus.textContent = "Up to date";
        return;
      }
      state.pricePerHour = remotePrice;
      state.players = sortPlayers(remotePlayers);
      state.updatedAt = remoteUpdatedAt;
      render();
      connectionStatus.textContent = "Updated";
    }

    // Realtime listener
    function startRealtime() {
      try {
        unsubscribe = onSnapshot(roomDocRef, (docSnap) => {
          if (!docSnap.exists()) {
            const init = { pricePerHour: state.pricePerHour || 46, players: state.players || [], updatedAt: serverTimestamp() };
            setDoc(roomDocRef, init).catch(err => {
              console.error("Init failed", err);
              connectionStatus.textContent = "Init failed";
            });
            return;
          }
          const data = docSnap.data();
          applyRemoteData(data);
        }, (err) => {
          console.error("Realtime error", err);
          connectionStatus.textContent = "Realtime error";
          connectionStatus.classList.add("muted");
        });
      } catch (err) {
        console.error("Start realtime failed", err);
        connectionStatus.textContent = "Realtime unavailable";
        connectionStatus.classList.add("muted");
      }
    }

    // Initial load
    async function init() {
      state = { pricePerHour: Number(pricePerHourInput.value || 46), players: [], updatedAt: null };
      render();
      try {
        const snap = await getDoc(roomDocRef);
        if (snap.exists()) {
          applyRemoteData(snap.data());
        } else {
          await setDoc(roomDocRef, { pricePerHour: state.pricePerHour, players: state.players, updatedAt: serverTimestamp() });
        }
      } catch (err) {
        console.warn("Initial fetch failed", err);
        connectionStatus.textContent = "Offline or permission denied";
        connectionStatus.classList.add("muted");
      }
      startRealtime();
    }

    // Event delegation for table actions
    playersTbody.addEventListener("click", (ev) => {
      const btn = ev.target.closest("button");
      if (!btn) return;
      const id = btn.dataset.id;
      if (!id) return;
      if (btn.classList.contains("inc")) modifyPlayerHours(id, 1);
      else if (btn.classList.contains("dec")) modifyPlayerHours(id, -1);
      else if (btn.classList.contains("delete")) deletePlayer(id);
    });

    // Inline edits
    playersTbody.addEventListener("input", (ev) => {
      const nameInput = ev.target.closest("input.player-name");
      if (nameInput) {
        const id = nameInput.dataset.id;
        const p = state.players.find(x => String(x.id) === String(id));
        if (p && p.name !== nameInput.value) {
          p.name = nameInput.value;
          scheduleSave();
        }
        return;
      }
      const hoursInput = ev.target.closest("input.player-hours");
      if (hoursInput) {
        const id = hoursInput.dataset.id;
        const p = state.players.find(x => String(x.id) === String(id));
        const newHours = Number(hoursInput.value || 0);
        if (p && p.hours !== newHours) {
          p.hours = newHours;
          scheduleSave();
        }
      }
    });

    // Add player
    addPlayerBtn.addEventListener("click", () => {
      const name = (newPlayerName.value || "").trim();
      const hours = Number(newPlayerHours.value || 0);
      if (!name) { newPlayerName.focus(); return; }
      const id = Date.now() + Math.floor(Math.random() * 1000);
      state.players.push({ id, name, hours });
      newPlayerName.value = "";
      newPlayerHours.value = "0";
      render();
      scheduleSave();
    });

    // Add then edit (focus newly added)
    addEditPlayerBtn.addEventListener("click", () => {
      const name = (newPlayerName.value || "").trim();
      const hours = Number(newPlayerHours.value || 0);
      if (!name) { newPlayerName.focus(); return; }
      const id = Date.now() + Math.floor(Math.random() * 1000);
      state.players.push({ id, name, hours });
      newPlayerName.value = "";
      newPlayerHours.value = "0";
      render();
      scheduleSave();
      setTimeout(() => {
        const input = playersTbody.querySelector(`input.player-name[data-id="${id}"]`);
        if (input) { input.focus(); input.select(); }
      }, 50);
    });

    // Price change
    pricePerHourInput.addEventListener("change", () => {
      const v = Number(pricePerHourInput.value || 0);
      if (state.pricePerHour !== v) {
        state.pricePerHour = v;
        scheduleSave();
      }
    });

    // Modify hours helper
    function modifyPlayerHours(id, delta) {
      const p = state.players.find(x => String(x.id) === String(id));
      if (!p) return;
      p.hours = Math.max(0, Number(p.hours || 0) + delta);
      render();
      scheduleSave();
    }

    // Delete player
    function deletePlayer(id) {
      const idx = state.players.findIndex(x => String(x.id) === String(id));
      if (idx === -1) return;
      state.players.splice(idx, 1);
      render();
      scheduleSave();
    }

    // Reset
    resetBtn.addEventListener("click", () => {
      if (!confirm("รีเซ็ตเป็นค่าเริ่มต้น?")) return;
      state.pricePerHour = 46;
      state.players = [];
      render();
      scheduleSave();
    });

    // Clear
    clearBtn.addEventListener("click", () => {
      if (!confirm("ล้างข้อมูลทั้งหมด?")) return;
      state.players = [];
      render();
      scheduleSave();
    });

    // Export CSV
    exportBtn.addEventListener("click", () => {
      const rows = [["id","name","hours"]];
      (state.players || []).forEach(p => rows.push([p.id, p.name, p.hours]));
      const csv = rows.map(r => r.map(cell => `"${String(cell).replaceAll('"','""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `room-${room}-players.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // Share URL
    shareBtn.addEventListener("click", async () => {
      const url = new URL(location.href);
      url.searchParams.set("room", room);
      try {
        await navigator.clipboard.writeText(url.toString());
        alert("ลิงก์ห้องถูกคัดลอกแล้ว");
      } catch (err) {
        prompt("คัดลอกลิงก์นี้:", url.toString());
      }
    });

    // Online/offline
    window.addEventListener("online", () => {
      connectionStatus.textContent = "Online";
      connectionStatus.classList.remove("muted");
    });
    window.addEventListener("offline", () => {
      connectionStatus.textContent = "Offline";
      connectionStatus.classList.add("muted");
    });

    // Cleanup
    window.addEventListener("beforeunload", () => {
      if (unsubscribe) unsubscribe();
    });

    // Start app
    init();
  </script>
</body>
</html>
