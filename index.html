<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ก๊วนแบดมินตัน — จัดการสมาชิก</title>
  <meta name="description" content="Devloped by Ball Rittha 0957602580" />

  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#f3f0ff;
      --card:#ffffff;
      --muted:#6b7280;
      --accent:#ec4899;
      --accent-2:#7c3aed;
      --success:#16a34a;
      --danger:#ef4444;
      --radius:14px;
      --shadow: 0 8px 30px rgba(15,23,42,0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      padding:28px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#0f172a;
    }

    .container{max-width:1100px;margin:0 auto}
    .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);overflow:hidden}
    header.app-header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:56px;height:56px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;font-weight:700;font-size:20px;box-shadow: 0 6px 18px rgba(124,58,237,0.18)}
    h1{margin:0;font-size:20px}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{border:0;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600;color:white;background:var(--accent);box-shadow: 0 6px 18px rgba(236,72,153,0.12)}
    .btn.secondary{background:linear-gradient(90deg,var(--accent-2),#5b21b6);box-shadow: 0 6px 18px rgba(124,58,237,0.12)}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid #eef2ff;box-shadow:none}

    .grid{display:grid;grid-template-columns: 1fr 320px;gap:18px;margin-top:12px}

    /* Table container with vertical scrollbar when content grows */
    .table-wrap{
      overflow:auto;
      border-radius:12px;
      border:1px solid #f1f5f9;
      max-height:420px; /* ปรับค่านี้ตามต้องการ */
    }
    table{width:100%;border-collapse:collapse;min-width:640px}
    thead th{text-align:left;padding:12px 16px;background:linear-gradient(90deg,#fff 0%, #fbf8ff 100%);font-size:13px;color:#374151;position:sticky;top:0;z-index:2}
    tbody td{padding:12px 16px;border-top:1px solid #f8fafc;vertical-align:middle;font-size:14px;color:#0f172a}
    tbody tr:hover{background:#fff7fb}
    .small{font-size:13px;color:var(--muted)}
    .center{text-align:center}
    .actions{display:flex;gap:8px;justify-content:center}

    .icon-btn{border:0;background:#eef2ff;color:#1e3a8a;padding:8px;border-radius:8px;cursor:pointer;min-width:36px;display:inline-grid;place-items:center}
    .icon-btn.danger{background:#fff1f2;color:var(--danger)}
    .icon-btn.success{background:#ecfdf5;color:var(--success)}

    input[type="number"], input[type="text"]{padding:8px 10px;border-radius:8px;border:1px solid #e6edf3;font-size:14px;width:100%}

    .panel{background:linear-gradient(180deg,#ffffff, #fbf8ff);border-radius:12px;padding:14px;box-shadow: 0 6px 18px rgba(99,102,241,0.04)}
    .panel h3{margin:0 0 8px 0}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .muted{color:var(--muted);font-size:13px}
    .total{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:10px;background:linear-gradient(90deg,#fff,#f8fafc);margin-top:12px;font-weight:700}

    /* custom scrollbar (modern browsers) */
    .table-wrap::-webkit-scrollbar{width:12px}
    .table-wrap::-webkit-scrollbar-track{background:transparent}
    .table-wrap::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#e9d5ff,#fbcfe8);border-radius:10px;border:3px solid transparent;background-clip:padding-box}

    @media (max-width:920px){.grid{grid-template-columns:1fr;}table{min-width:560px}}
    @media (max-width:640px){table{min-width:520px}.logo{width:48px;height:48px;font-size:18px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card" role="application" aria-label="จัดการสมาชิกก๊วนแบดมินตัน">
      <header class="app-header">
        <div class="brand">
          <div class="logo" aria-hidden="true">🏸</div>
          <div>
            <h1>ก๊วนคนรักแบดมินตัน</h1>
            <p class="lead">Develop by Ball Rittha 0957602580</p>
          </div>
        </div>

        <div class="controls" aria-hidden="false">
          <button id="resetBtn" class="btn ghost" title="รีเซ็ตข้อมูลตัวอย่าง">รีเซ็ต</button>
          <button id="clearStorageBtn" class="btn ghost" title="ล้างข้อมูลที่เก็บไว้">ล้างข้อมูล</button>
          <button id="shareBtn" class="btn ghost" title="แชร์ข้อมูล">แชร์</button>
          <button id="exportBtn" class="btn ghost" title="Export CSV">Export CSV</button>
          <button id="addRowBtn" class="btn secondary" title="เพิ่มสมาชิกใหม่">+ เพิ่มสมาชิก</button>
        </div>
      </header>

      <div class="grid">
        <!-- Left: Table -->
        <div>
          <div class="small muted">ตั้งค่า</div>
          <div style="display:flex;gap:10px;align-items:center;margin:8px 0 14px 0">
            <label class="small muted" for="priceInput">ราคา ต่อชั่วโมง</label>
            <input id="priceInput" type="number" min="0" step="1" value="48" style="width:120px" aria-label="ราคา ต่อชั่วโมง">
            <div class="muted" style="margin-left:auto">ค่าใช้จ่ายจะคำนวณอัตโนมัติ</div>
          </div>

          <div class="table-wrap" role="region" aria-label="ตารางสมาชิก">
            <table id="playersTable" aria-describedby="tableDesc">
              <caption id="tableDesc" style="display:none">ตารางแสดงสมาชิก จำนวนชั่วโมง และค่าใช้จ่าย</caption>
              <thead>
                <tr>
                  <th>ชื่อ</th>
                  <th class="center">ชม.</th>
                  <th class="center">ค่าใช้จ่าย</th>
                  <th class="center">เพิ่ม</th>
                  <th class="center">ลด</th>
                  <th class="center">ลบ</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <!-- rows injected by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Right: Controls and summary -->
        <aside class="panel" aria-label="สรุปและเพิ่มสมาชิก">
          <h3>เพิ่มสมาชิกใหม่</h3>
          <div class="row">
            <input id="newName" type="text" placeholder="ชื่อสมาชิก" aria-label="ชื่อสมาชิก">
          </div>
          <div class="row">
            <input id="newHours" type="number" min="0" step="1" value="1" aria-label="ชั่วโมงเริ่มต้น">
          </div>
          <div style="display:flex;gap:8px">
            <button id="createBtn" class="btn">เพิ่ม</button>
            <button id="createAndEditBtn" class="btn ghost">เพิ่มแล้วแก้ไข</button>
          </div>

          <div style="margin-top:16px">
            <div class="muted">สรุป</div>
            <div class="total" aria-live="polite">
              <div>สมาชิกทั้งหมด</div>
              <div id="count">0</div>
            </div>
            <div class="total" style="margin-top:8px" aria-live="polite">
              <div>รวมชั่วโมง</div>
              <div id="sumHours">0</div>
            </div>
            <div class="total" style="margin-top:8px" aria-live="polite">
              <div>รวมค่าใช้จ่าย</div>
              <div id="sumExpense">0</div>
            </div>
          </div>

          <div style="margin-top:14px" class="muted small">
            สามารถใช้ได้ทุกแพลตฟอร์ม
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const $ = (sel, root=document) => root.querySelector(sel);
      const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
      const formatCurrency = v => Number(v).toLocaleString('th-TH');



      let players = [];
      let pricePerHour = 48;
      const STORAGE_KEY = 'badminton_roster_v3';

      const tbody = $('#tbody');
      const priceInput = $('#priceInput');
      const countEl = $('#count');
      const sumHoursEl = $('#sumHours');
      const sumExpenseEl = $('#sumExpense');
      const addRowBtn = $('#addRowBtn');
      const createBtn = $('#createBtn');
      const createAndEditBtn = $('#createAndEditBtn');
      const newName = $('#newName');
      const newHours = $('#newHours');
      const resetBtn = $('#resetBtn');
      const clearStorageBtn = $('#clearStorageBtn');
      const shareBtn = $('#shareBtn');
      const exportBtn = $('#exportBtn');

      function load(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          if(raw){
            const parsed = JSON.parse(raw);
            players = parsed.players || SAMPLE.slice();
            pricePerHour = parsed.pricePerHour ?? pricePerHour;
          } else {
            players = SAMPLE.slice();
          }
        }catch(e){
          console.error('load error', e);
          players = SAMPLE.slice();
        }
        priceInput.value = pricePerHour;
        render();
      }

      function save(){
        try{
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ players, pricePerHour }));
        }catch(e){
          console.warn('save failed', e);
        }
      }

      function expenseFor(p){
        return Math.max(0, Math.round(p.hours * pricePerHour));
      }

      // Sort players by hours ascending, then by name for stable order
      function sortPlayers(){
        players.sort((a,b) => {
          if (a.hours !== b.hours) return a.hours - b.hours;
          return String(a.name).localeCompare(String(b.name), 'th');
        });
      }

      function render(){
        // ensure sorted before render
        sortPlayers();

        tbody.innerHTML = '';
        players.forEach((p) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <input type="text" data-id="${p.id}" class="name-input" value="${escapeHtml(p.name)}" />
            </td>
            <td class="center">
              <input type="number" min="0" step="1" data-id="${p.id}" class="hours-input" value="${p.hours}" style="width:72px" />
            </td>
            <td class="center small">${formatCurrency(expenseFor(p))} ฿</td>
            <td class="center">
              <button class="icon-btn success inc-btn" data-id="${p.id}" title="เพิ่ม 1 ชั่วโมง">＋</button>
            </td>
            <td class="center">
              <button class="icon-btn danger dec-btn" data-id="${p.id}" title="ลด 1 ชั่วโมง">－</button>
            </td>
            <td class="center">
              <div class="actions">
                <button class="icon-btn delete-btn" data-id="${p.id}" title="ลบสมาชิก">🗑</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });

        // Attach events
        $$('.inc-btn').forEach(btn => btn.addEventListener('click', onInc));
        $$('.dec-btn').forEach(btn => btn.addEventListener('click', onDec));
        $$('.delete-btn').forEach(btn => btn.addEventListener('click', onDelete));
        $$('.hours-input').forEach(inp => inp.addEventListener('change', onHoursChange));
        $$('.name-input').forEach(inp => inp.addEventListener('change', onNameChange));

        updateSummary();
        save();
      }

      function onInc(e){
        const id = Number(e.currentTarget.dataset.id);
        players = players.map(p => p.id === id ? ({...p, hours: p.hours + 1}) : p);
        render();
      }
      function onDec(e){
        const id = Number(e.currentTarget.dataset.id);
        players = players.map(p => p.id === id ? ({...p, hours: Math.max(0, p.hours - 1)}) : p);
        render();
      }
      function onDelete(e){
        const id = Number(e.currentTarget.dataset.id);
        if(!confirm('ต้องการลบสมาชิกนี้จริงหรือไม่')) return;
        players = players.filter(p => p.id !== id);
        render();
      }
      function onHoursChange(e){
        const id = Number(e.currentTarget.dataset.id);
        const val = Math.max(0, Math.floor(Number(e.currentTarget.value) || 0));
        players = players.map(p => p.id === id ? ({...p, hours: val}) : p);
        render();
      }
      function onNameChange(e){
        const id = Number(e.currentTarget.dataset.id);
        const val = String(e.currentTarget.value || '').trim() || 'ไม่ระบุ';
        players = players.map(p => p.id === id ? ({...p, name: val}) : p);
        render();
      }

      function addMember(name, hours=1){
        const id = Date.now() + Math.floor(Math.random()*1000);
        players.push({ id, name: String(name||'ไม่ระบุ'), hours: Number(hours)||0 });
        render();
      }

      function updateSummary(){
        const count = players.length;
        const sumHours = players.reduce((s,p)=>s+p.hours,0);
        const sumExpense = players.reduce((s,p)=>s+expenseFor(p),0);
        countEl.textContent = count;
        sumHoursEl.textContent = sumHours;
        sumExpenseEl.textContent = formatCurrency(sumExpense) + ' ฿';
      }

      function escapeHtml(s){
        return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])});
      }

      priceInput.addEventListener('change', () => {
        const v = Math.max(0, Math.round(Number(priceInput.value) || 0));
        pricePerHour = v;
        priceInput.value = v;
        render();
      });

      addRowBtn.addEventListener('click', () => {
        newName.focus();
        addMember('สมาชิกใหม่', 1);
      });

      createBtn.addEventListener('click', () => {
        const name = newName.value.trim() || 'ไม่ระบุ';
        const hours = Math.max(0, Math.floor(Number(newHours.value) || 0));
        addMember(name, hours);
        newName.value = '';
        newHours.value = 1;
      });

      createAndEditBtn.addEventListener('click', () => {
        createBtn.click();
        setTimeout(()=> {
          const lastNameInput = tbody.querySelector('input.name-input:last-of-type');
          if(lastNameInput) lastNameInput.focus();
        }, 50);
      });

      resetBtn.addEventListener('click', () => {
        if(!confirm('รีเซ็ตเป็นข้อมูลตัวอย่าง? ข้อมูลปัจจุบันจะถูกแทนที่')) return;
        players = SAMPLE.slice();
        pricePerHour = 48;
        priceInput.value = pricePerHour;
        render();
      });

      clearStorageBtn.addEventListener('click', () => {
        if(!confirm('ล้างข้อมูลที่เก็บไว้ในเบราว์เซอร์?')) return;
        localStorage.removeItem(STORAGE_KEY);
        load();
      });

      // Export CSV
      function exportCSV(){
        const headers = ['ชื่อ','ชั่วโมง','ค่าใช้จ่าย(฿)'];
        const rows = players.map(p => [p.name, p.hours, expenseFor(p)]);
        const meta = [`ราคา/ชม.: ${pricePerHour} ฿`, `สร้างเมื่อ: ${new Date().toLocaleString('th-TH')}`, ''];
        const csvLines = [];
        csvLines.push(meta.join(','));
        csvLines.push(headers.join(','));
        rows.forEach(r => {
          const line = r.map(cell => {
            const s = String(cell).replace(/"/g,'""');
            return s.includes(',') || s.includes('"') ? `"${s}"` : s;
          }).join(',');
          csvLines.push(line);
        });
        const csv = csvLines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const filename = `badminton_roster_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.csv`;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      exportBtn.addEventListener('click', () => {
        try{
          exportCSV();
        }catch(e){
          alert('เกิดข้อผิดพลาดขณะ Export CSV');
          console.error(e);
        }
      });

      // Share (Web Share API with fallback to copy CSV text)
      async function shareData(){
        const summary = `ก๊วนแบดมินตัน — สมาชิก ${players.length}, รวมชั่วโมง ${players.reduce((s,p)=>s+p.hours,0)}, รวมค่าใช้จ่าย ${players.reduce((s,p)=>s+expenseFor(p),0)} ฿`;
        if(navigator.share){
          try{
            await navigator.share({
              title: 'ก๊วนแบดมินตัน',
              text: summary,
              url: location.href
            });
            return;
          }catch(err){
            // fallback
          }
        }
        try{
          const headers = ['ชื่อ','ชั่วโมง','ค่าใช้จ่าย(฿)'];
          const rows = players.map(p => [p.name, p.hours, expenseFor(p)]);
          const csvLines = [];
          csvLines.push(`ราคา/ชม.: ${pricePerHour} ฿, สร้างเมื่อ: ${new Date().toLocaleString('th-TH')}`);
          csvLines.push(headers.join(','));
          rows.forEach(r => csvLines.push(r.join(',')));
          const csv = csvLines.join('\n');
          await navigator.clipboard.writeText(csv);
          alert('ข้อมูลถูกคัดลอกเป็น CSV ไปยังคลิปบอร์ดแล้ว คุณสามารถวาง (paste) เพื่อแชร์ได้');
        }catch(e){
          try{
            await navigator.clipboard.writeText(location.href);
            alert('ไม่สามารถแชร์โดยตรง ได้คัดลอกลิงก์หน้าเว็บไปยังคลิปบอร์ดแล้ว');
          }catch(err){
            alert('ไม่สามารถแชร์อัตโนมัติได้ โปรดคัดลอกข้อมูลด้วยตนเอง');
          }
        }
      }

      shareBtn.addEventListener('click', () => {
        shareData();
      });

      load();

      // Expose for debugging
      window.__badminton = {
        get players(){ return players },
        setPrice(v){ pricePerHour = v; priceInput.value = v; render(); },
        addMember
      };
    })();
  </script>
</body>
</html>
